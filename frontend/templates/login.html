<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign in — Pak-ClimInt</title>
  <link rel="icon" type="image/png" href="{{ url_for('static', filename='favicon.png') }}">
  <style>
    :root {
      --bg: #060b09; --panel: rgba(16, 25, 21, 0.66);
      --border: rgba(255, 255, 255, 0.09); --text: #e8f0ec;
      --dim: #8fa39a; --accent: #35c48d; --blue: #4aa3f0; --danger: #e66767;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      font-family: "Segoe UI", system-ui, sans-serif; color: var(--text);
      background:
        radial-gradient(1100px 700px at 18% 40%, #0d1f18 0%, transparent 60%),
        radial-gradient(900px 600px at 85% 80%, #0a1a26 0%, transparent 55%),
        var(--bg);
      overflow: hidden; display: flex; align-items: center; justify-content: center;
    }
    canvas.layer { position: fixed; inset: 0; pointer-events: none; }
    #stars { z-index: 0; } #globe { z-index: 1; }

    /* scene grid: globe breathing room left, card right */
    .scene {
      position: relative; z-index: 2; width: min(1180px, 94vw);
      display: grid; grid-template-columns: 1.15fr 1fr; align-items: center;
      gap: 2rem;
    }
    .tagline-wrap { padding: 2rem; }
    .tagline-wrap h2 {
      font-size: clamp(1.6rem, 3.4vw, 2.7rem); font-weight: 800; line-height: 1.2;
      background: linear-gradient(100deg, #e8f0ec 35%, #7df2c5 50%, #e8f0ec 65%);
      background-size: 220% 100%; -webkit-background-clip: text; background-clip: text;
      -webkit-text-fill-color: transparent; animation: shimmer 5s linear infinite;
    }
    @keyframes shimmer { to { background-position: -220% 0; } }
    #typed {
      display: block; margin-top: 1rem; color: var(--dim); font-size: 1rem;
      min-height: 1.6em; font-family: Consolas, monospace;
    }
    #typed::after { content: "▋"; color: var(--accent); animation: blink 1s steps(1) infinite; }
    @keyframes blink { 50% { opacity: 0; } }
    .stats-row { display: flex; gap: 1.8rem; margin-top: 2rem; flex-wrap: wrap; }
    .mini-stat .n { font-size: 1.25rem; font-weight: 700; color: var(--accent); }
    .mini-stat .t { font-size: 0.7rem; color: var(--dim); text-transform: uppercase; letter-spacing: 0.07em; }

    /* card with 3D parallax + rotating gradient border */
    @property --ga { syntax: "<angle>"; initial-value: 0deg; inherits: false; }
    .card-outer { perspective: 1100px; }
    .card {
      position: relative; width: min(410px, 92vw); margin-left: auto;
      border: 1px solid transparent; border-radius: 20px;
      background:
        linear-gradient(var(--panel), var(--panel)) padding-box,
        conic-gradient(from var(--ga), rgba(53,196,141,0.9), rgba(74,163,240,0.7),
                       rgba(144,133,233,0.7), rgba(53,196,141,0.9)) border-box;
      animation: spin-border 8s linear infinite, card-in 0.9s cubic-bezier(0.16, 1, 0.3, 1);
      padding: 2.2rem 2.1rem 1.8rem; backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      box-shadow: 0 30px 80px rgba(0, 0, 0, 0.6);
      transform-style: preserve-3d; transition: transform 0.08s linear;
    }
    @keyframes spin-border { to { --ga: 360deg; } }
    @keyframes card-in { from { opacity: 0; transform: translateY(30px) scale(0.96); } }
    .card.shake { animation: shake 0.45s; }
    @keyframes shake { 20%, 60% { transform: translateX(-9px); } 40%, 80% { transform: translateX(9px); } }
    .card.success-out { animation: card-out 0.55s ease forwards; }
    @keyframes card-out { to { opacity: 0; transform: translateY(-20px) scale(0.97); } }

    .brand { display: flex; align-items: center; gap: 0.8rem; margin-bottom: 1.4rem; transform: translateZ(30px); }
    .brand img { width: 50px; height: 50px; animation: logo-pop 1s cubic-bezier(0.34, 1.56, 0.64, 1); filter: drop-shadow(0 0 12px rgba(53,196,141,0.4)); }
    @keyframes logo-pop { from { transform: scale(0.3) rotate(-30deg); opacity: 0; } }
    .brand h1 { font-size: 1.28rem; }
    .brand small { display: block; color: var(--dim); font-size: 0.72rem; font-weight: 400; margin-top: 2px; }

    .tabs { display: flex; background: rgba(255,255,255,0.05); border-radius: 11px; padding: 4px; margin-bottom: 1.25rem; position: relative; transform: translateZ(20px); }
    .tabs::before {
      content: ""; position: absolute; top: 4px; bottom: 4px; left: 4px;
      width: calc(50% - 4px); border-radius: 8px;
      background: rgba(53, 196, 141, 0.18); border: 1px solid rgba(53, 196, 141, 0.35);
      transition: transform 0.28s cubic-bezier(0.16, 1, 0.3, 1);
    }
    .tabs.signup::before { transform: translateX(100%); }
    .tabs button { flex: 1; padding: 0.55rem; background: none; border: none; color: var(--dim); font-size: 0.85rem; font-weight: 600; cursor: pointer; z-index: 1; transition: color 0.2s; }
    .tabs button.active { color: var(--accent); }
    form.pane { animation: pane-in 0.3s ease; transform: translateZ(15px); }
    @keyframes pane-in { from { opacity: 0; transform: translateX(10px); } }

    .field { position: relative; margin-bottom: 1rem; }
    .field input {
      width: 100%; padding: 0.95rem 2.6rem 0.35rem 0.85rem;
      background: rgba(255, 255, 255, 0.06); color: var(--text);
      border: 1px solid var(--border); border-radius: 10px; font-size: 0.92rem;
      outline: none; transition: border-color 0.2s, box-shadow 0.25s;
    }
    .field input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(53,196,141,0.14), 0 0 24px rgba(53,196,141,0.12); }
    .field label { position: absolute; left: 0.9rem; top: 0.72rem; color: var(--dim); font-size: 0.9rem; pointer-events: none; transition: all 0.18s ease; }
    .field input:focus + label, .field input:not(:placeholder-shown) + label {
      top: 0.28rem; font-size: 0.62rem; letter-spacing: 0.05em; text-transform: uppercase; color: var(--accent);
    }
    .eye { position: absolute; right: 0.6rem; top: 50%; transform: translateY(-50%); background: none; border: none; color: var(--dim); cursor: pointer; font-size: 1rem; padding: 4px; }
    .eye:hover { color: var(--text); }

    .row-opts { display: flex; justify-content: space-between; align-items: center; margin: 0.15rem 0 1.15rem; font-size: 0.8rem; color: var(--dim); }
    .remember { display: flex; align-items: center; gap: 0.45rem; cursor: pointer; }
    .remember input { accent-color: var(--accent); cursor: pointer; }
    .forgot { color: var(--blue); text-decoration: none; }
    .forgot:hover { text-decoration: underline; }

    .submit {
      width: 100%; padding: 0.85rem; border: none; border-radius: 10px;
      background: linear-gradient(120deg, #35c48d, #24a06f, #35c48d);
      background-size: 200% 100%; animation: btn-flow 4s linear infinite;
      color: #08130e; font-weight: 700; font-size: 0.95rem; cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: 0.6rem;
      transition: transform 0.12s ease, box-shadow 0.2s;
    }
    @keyframes btn-flow { to { background-position: -200% 0; } }
    .submit:hover { transform: translateY(-2px); box-shadow: 0 10px 30px rgba(53, 196, 141, 0.35); }
    .submit:active { transform: scale(0.98); }
    .submit:disabled { filter: grayscale(0.6); cursor: wait; }
    .spinner { width: 16px; height: 16px; border: 2px solid rgba(8,19,14,0.35); border-top-color: #08130e; border-radius: 50%; display: none; animation: spin 0.7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .submit.loading .spinner { display: inline-block; }

    .divider { display: flex; align-items: center; gap: 0.8rem; margin: 1.1rem 0; color: var(--dim); font-size: 0.74rem; }
    .divider::before, .divider::after { content: ""; flex: 1; height: 1px; background: var(--border); }
    #g-wrap { display: flex; justify-content: center; min-height: 44px; }
    .hint { margin-top: 1.05rem; text-align: center; color: var(--dim); font-size: 0.7rem; }

    #toasts { position: fixed; top: 22px; left: 50%; transform: translateX(-50%); z-index: 10; display: flex; flex-direction: column; gap: 8px; }
    .toast { padding: 0.7rem 1.2rem; border-radius: 10px; font-size: 0.86rem; backdrop-filter: blur(12px); border: 1px solid var(--border); animation: toast-in 0.35s cubic-bezier(0.16, 1, 0.3, 1); box-shadow: 0 10px 30px rgba(0,0,0,0.4); }
    @keyframes toast-in { from { opacity: 0; transform: translateY(-14px); } }
    .toast.err { background: rgba(120, 35, 35, 0.85); color: #ffd9d9; }
    .toast.ok { background: rgba(23, 92, 66, 0.9); color: #d3f5e6; }
    .toast.info { background: rgba(28, 52, 74, 0.9); color: #d8eaff; }

    @media (max-width: 900px) {
      .scene { grid-template-columns: 1fr; }
      .tagline-wrap { display: none; }
      .card { margin: 0 auto; }
      body { overflow-y: auto; }
    }
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation: none !important; transition: none !important; }
    }
  </style>
</head>
<body data-palette="#3987e5,#199e70,#c98500,#9085e9,#e66767">
  <canvas id="stars" class="layer"></canvas>
  <canvas id="globe" class="layer"></canvas>
  <div id="toasts"></div>

  <div class="scene">
    <div class="tagline-wrap">
      <h2>Multi Agentic<br>Climate Intelligence</h2>
      <span id="typed"></span>
      <div class="stats-row">
        <div class="mini-stat"><div class="n">6</div><div class="t">AI agents</div></div>
        <div class="mini-stat"><div class="n">10+</div><div class="t">Official datasets</div></div>
        <div class="mini-stat"><div class="n">130+</div><div class="t">Areas of interest</div></div>
        <div class="mini-stat"><div class="n">24/7</div><div class="t">Monitoring</div></div>
      </div>
    </div>

    <div class="card-outer">
      <main class="card" id="card">
        <div class="brand">
          <img src="{{ url_for('static', filename='favicon.png') }}" alt="NDMA">
          <h1>Pak-ClimInt
            <small>Flood Early Warning · NDMA Pakistan</small>
          </h1>
        </div>

        <div class="tabs" id="tabs">
          <button type="button" id="tab-in" class="active">Sign in</button>
          <button type="button" id="tab-up">Create account</button>
        </div>

        <form id="login-form" class="pane" autocomplete="on">
          <div class="field">
            <input type="email" id="email" placeholder=" " required autocomplete="username">
            <label for="email">Email</label>
          </div>
          <div class="field">
            <input type="password" id="password" placeholder=" " required autocomplete="current-password">
            <label for="password">Password</label>
            <button type="button" class="eye" id="eye" title="Show password">👁</button>
          </div>
          <div class="row-opts">
            <label class="remember"><input type="checkbox" id="remember"> Remember me</label>
            <a class="forgot" href="#" id="forgot">Forgot password?</a>
          </div>
          <button class="submit" id="submit" type="submit">
            <span class="spinner"></span><span id="submit-label">Sign in</span>
          </button>
        </form>

        <form id="signup-form" class="pane" autocomplete="on" style="display:none">
          <div class="field">
            <input type="text" id="su-name" placeholder=" " autocomplete="name">
            <label for="su-name">Full name</label>
          </div>
          <div class="field">
            <input type="email" id="su-email" placeholder=" " required autocomplete="username">
            <label for="su-email">Email</label>
          </div>
          <div class="field">
            <input type="password" id="su-password" placeholder=" " required minlength="8" autocomplete="new-password">
            <label for="su-password">Password (min 8 characters)</label>
            <button type="button" class="eye" id="su-eye" title="Show password">👁</button>
          </div>
          <div class="field">
            <input type="password" id="su-confirm" placeholder=" " required autocomplete="new-password">
            <label for="su-confirm">Confirm password</label>
          </div>
          <button class="submit" id="su-submit" type="submit">
            <span class="spinner"></span><span id="su-label">Create account</span>
          </button>
        </form>

        <div id="g-section" style="display:none">
          <div class="divider">or continue with</div>
          <div id="g-wrap"></div>
        </div>

        <div class="hint">Authorized operators only · flood early-warning platform</div>
      </main>
    </div>
  </div>

  <script>
    const $ = (id) => document.getElementById(id);
    function toast(cls, msg, ms = 3800) {
      const t = document.createElement("div");
      t.className = `toast ${cls}`; t.textContent = msg;
      $("toasts").appendChild(t);
      setTimeout(() => t.remove(), ms);
    }

    /* ---- Continue with Google (shown only when configured) ---- */
    const GOOGLE_CLIENT_ID = "{{ google_client_id }}";
    if (GOOGLE_CLIENT_ID) {
      const s = document.createElement("script");
      s.src = "https://accounts.google.com/gsi/client";
      s.onload = () => {
        google.accounts.id.initialize({
          client_id: GOOGLE_CLIENT_ID,
          callback: async (resp) => {
            try {
              const r = await fetch("/api/google", {
                method: "POST", headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ credential: resp.credential }),
              });
              const d = await r.json();
              if (r.ok && d.ok) {
                toast("ok", "Signed in with Google — loading the portal…");
                $("card").classList.add("success-out");
                setTimeout(() => (location.href = "/"), 650);
              } else { toast("err", d.error || "Google sign-in failed"); }
            } catch { toast("err", "Cannot reach the server."); }
          },
        });
        google.accounts.id.renderButton($("g-wrap"), {
          theme: "filled_black", size: "large", shape: "pill",
          text: "continue_with", width: 300,
        });
        $("g-section").style.display = "";
      };
      document.head.appendChild(s);
    }

    /* ================== CINEMATIC SCENE ================== */
    const reduced = matchMedia("(prefers-reduced-motion: reduce)").matches;

    /* starfield + shooting stars */
    const sc = $("stars"), sx = sc.getContext("2d");
    let SW, SH, stars = [], shots = [];
    function starResize() {
      SW = sc.width = innerWidth; SH = sc.height = innerHeight;
      stars = Array.from({ length: Math.min(240, SW * SH / 9000) }, () => ({
        x: Math.random() * SW, y: Math.random() * SH,
        r: Math.random() * 1.3 + 0.3, p: Math.random() * Math.PI * 2,
        s: 0.4 + Math.random() * 1.2,
      }));
    }
    starResize(); addEventListener("resize", starResize);

    /* 3D dotted globe with Pakistan highlight + orbiting satellite */
    const gc = $("globe"), gx = gc.getContext("2d");
    let GW, GH, R, CX, CY;
    function globeResize() {
      GW = gc.width = innerWidth; GH = gc.height = innerHeight;
      R = Math.min(GW, GH) * 0.34;
      CX = GW <= 900 ? GW / 2 : GW * 0.30;
      CY = GH * 0.52;
    }
    globeResize(); addEventListener("resize", globeResize);

    // sphere point cloud (lat/lon rings) + Pakistan patch (24-37N, 61-77E)
    const pts = [];
    for (let la = -80; la <= 80; la += 8) {
      const n = Math.max(6, Math.round(36 * Math.cos(la * Math.PI / 180)));
      for (let i = 0; i < n; i++) {
        const lo = (i / n) * 360 - 180;
        const pk = la >= 23 && la <= 38 && lo >= 60 && lo <= 78;
        pts.push({ la: la * Math.PI / 180, lo: lo * Math.PI / 180, pk });
      }
    }
    let rot = 0, mouseX = 0, mouseY = 0;
    addEventListener("mousemove", (e) => {
      mouseX = e.clientX / innerWidth - 0.5;
      mouseY = e.clientY / innerHeight - 0.5;
      /* card 3D parallax */
      if (!reduced) $("card").style.transform =
        `rotateY(${mouseX * 7}deg) rotateX(${-mouseY * 7}deg)`;
    });

    function drawScene(t) {
      /* stars */
      sx.clearRect(0, 0, SW, SH);
      for (const st of stars) {
        const tw = 0.45 + 0.55 * Math.abs(Math.sin(t / 900 * st.s + st.p));
        sx.globalAlpha = tw;
        sx.fillStyle = "#cfe8dd";
        sx.beginPath(); sx.arc(st.x, st.y, st.r, 0, 7); sx.fill();
      }
      sx.globalAlpha = 1;
      if (Math.random() < 0.005) shots.push({ x: Math.random() * SW, y: Math.random() * SH * 0.4, v: 9 + Math.random() * 6, life: 1 });
      shots = shots.filter((s) => s.life > 0);
      for (const s of shots) {
        sx.strokeStyle = `rgba(210,240,228,${s.life * 0.8})`;
        sx.lineWidth = 1.6;
        sx.beginPath(); sx.moveTo(s.x, s.y); sx.lineTo(s.x - s.v * 4, s.y + s.v * 2); sx.stroke();
        s.x += s.v; s.y += s.v * 0.5; s.life -= 0.03;
      }

      /* globe — the SAME dotted Earth, enhanced: sun-lit point shading,
         a soft single atmosphere halo, glowing pulsing Pakistan and a
         radar ping sweeping out of it (no solid sphere underneath). */
      gx.clearRect(0, 0, GW, GH);
      rot += 0.0032;
      const tiltX = 0.35 + mouseY * 0.18, ry = rot + mouseX * 0.35;
      // one soft atmosphere halo hugging the point cloud
      const glow = gx.createRadialGradient(CX, CY, R * 0.86, CX, CY, R * 1.3);
      glow.addColorStop(0, "rgba(53,196,141,0.12)");
      glow.addColorStop(0.6, "rgba(90,190,255,0.05)");
      glow.addColorStop(1, "rgba(53,196,141,0)");
      gx.fillStyle = glow;
      gx.beginPath(); gx.arc(CX, CY, R * 1.3, 0, 7); gx.fill();
      // light direction (upper-left "sun") for realistic point shading
      const LX = -0.48, LY = 0.55, LZ = 0.68;
      const pkGlow = 0.6 + 0.4 * Math.sin(t / 480); // Pakistan breath
      for (const p of pts) {
        // rotate around Y then tilt around X
        const x0 = Math.cos(p.la) * Math.sin(p.lo + ry);
        const y0 = Math.sin(p.la);
        const z0 = Math.cos(p.la) * Math.cos(p.lo + ry);
        const y1 = y0 * Math.cos(tiltX) - z0 * Math.sin(tiltX);
        const z1 = y0 * Math.sin(tiltX) + z0 * Math.cos(tiltX);
        if (z1 < -0.15) continue; // back hemisphere fades out
        const persp = 1 / (1.6 - z1 * 0.4);
        const px = CX + x0 * R * persp, py = CY - y1 * R * persp;
        const lit = Math.max(0, x0 * LX + y1 * LY + z1 * LZ); // sun-facing?
        const a = (0.10 + 0.55 * Math.max(0, z1)) * (0.45 + 0.75 * lit);
        if (p.pk) {
          const pa = Math.min(1, a + 0.3 + 0.25 * pkGlow);
          gx.shadowColor = "rgba(125,242,197,0.9)";
          gx.shadowBlur = 6 + 5 * pkGlow;
          gx.fillStyle = `rgba(125,242,197,${pa})`;
          gx.beginPath(); gx.arc(px, py, (2.1 + 0.5 * pkGlow) * persp, 0, 7); gx.fill();
          gx.shadowBlur = 0;
        } else {
          gx.fillStyle = `rgba(126,168,150,${a})`;
          gx.beginPath(); gx.arc(px, py, 1.5 * persp, 0, 7); gx.fill();
        }
      }
      // radar ping sweeping out of Pakistan every ~3 s (front side only)
      {
        const la = 30.5 * Math.PI / 180, lo = 69.5 * Math.PI / 180;
        const x0 = Math.cos(la) * Math.sin(lo + ry);
        const y0 = Math.sin(la);
        const z0 = Math.cos(la) * Math.cos(lo + ry);
        const y1 = y0 * Math.cos(tiltX) - z0 * Math.sin(tiltX);
        const z1 = y0 * Math.sin(tiltX) + z0 * Math.cos(tiltX);
        if (z1 > 0.05) {
          const persp = 1 / (1.6 - z1 * 0.4);
          const px = CX + x0 * R * persp, py = CY - y1 * R * persp;
          const k = (t % 3000) / 3000; // 0..1 expansion
          gx.strokeStyle = `rgba(125,242,197,${0.55 * (1 - k)})`;
          gx.lineWidth = 1.6;
          gx.beginPath(); gx.arc(px, py, (4 + k * 34) * persp, 0, 7); gx.stroke();
        }
      }
      // orbiting satellite: body + solar panels, fading trail, blinking beacon
      gx.strokeStyle = "rgba(155,231,255,0.14)";
      gx.lineWidth = 1;
      gx.beginPath(); gx.ellipse(CX, CY, R * 1.25, R * 0.55, -0.15, 0, 7); gx.stroke();
      const satPos = (tt) => {
        const a = tt / 2400;
        const x3 = Math.sin(a) * 1.25, z3 = Math.cos(a) * 1.25, y3 = Math.sin(a * 0.7) * 0.35;
        const y1 = y3 * Math.cos(tiltX) - z3 * Math.sin(tiltX);
        const z1 = y3 * Math.sin(tiltX) + z3 * Math.cos(tiltX);
        const sp = 1 / (1.6 - z1 * 0.4);
        return { x: CX + x3 * R * sp, y: CY - y1 * R * sp, sp, z: z1 };
      };
      const S = satPos(t), Sprev = satPos(t - 60);
      // fading trail along the recent path
      for (let k = 1; k <= 14; k++) {
        const q = satPos(t - k * 90);
        gx.fillStyle = `rgba(155,231,255,${(0.30 * (1 - k / 14)) * (q.z > 0 ? 1 : 0.35)})`;
        gx.beginPath(); gx.arc(q.x, q.y, 1.4 * q.sp * (1 - k / 20), 0, 7); gx.fill();
      }
      const behind = S.z <= 0;
      const dim = behind ? 0.35 : 1;
      const ang = Math.atan2(S.y - Sprev.y, S.x - Sprev.x);
      gx.save();
      gx.translate(S.x, S.y); gx.rotate(ang); gx.scale(S.sp, S.sp);
      // solar panels (blue cells with grid lines)
      gx.fillStyle = `rgba(58,120,220,${0.9 * dim})`;
      gx.fillRect(-13, -3, 8, 6); gx.fillRect(5, -3, 8, 6);
      gx.strokeStyle = `rgba(190,220,255,${0.5 * dim})`; gx.lineWidth = 0.6;
      gx.strokeRect(-13, -3, 8, 6); gx.strokeRect(5, -3, 8, 6);
      gx.beginPath(); gx.moveTo(-9, -3); gx.lineTo(-9, 3); gx.moveTo(9, -3); gx.lineTo(9, 3); gx.stroke();
      // body + dish
      gx.fillStyle = `rgba(214,228,236,${0.95 * dim})`;
      gx.fillRect(-4, -4, 8, 8);
      gx.beginPath(); gx.arc(0, -6, 2.4, Math.PI, 0); gx.fill();
      gx.restore();
      // blinking beacon
      if (!behind && Math.floor(t / 500) % 3 === 0) {
        gx.fillStyle = "rgba(255,120,120,0.95)";
        gx.beginPath(); gx.arc(S.x, S.y - 9 * S.sp, 1.6 * S.sp, 0, 7); gx.fill();
      }

      requestAnimationFrame(drawScene);
    }
    if (!reduced) requestAnimationFrame(drawScene);

    /* typing tagline */
    const PHRASES = [
      "Monitoring Pakistan's rivers in real time…",
      "6 AI agents · NASA · NOAA · Copernicus data",
      "Rain, discharge, terrain, exposure — fused.",
      "Ask Alpha: \"full risk for Sindh\"",
    ];
    (function typer(pi = 0, ci = 0, del = false) {
      if (reduced) { $("typed").textContent = PHRASES[0]; return; }
      const ph = PHRASES[pi % PHRASES.length];
      $("typed").textContent = ph.slice(0, ci);
      if (!del && ci === ph.length) setTimeout(() => typer(pi, ci, true), 2100);
      else if (del && ci === 0) setTimeout(() => typer(pi + 1, 0, false), 350);
      else setTimeout(() => typer(pi, ci + (del ? -1 : 1), del), del ? 22 : 55);
    })();

    /* ---- form interactions (unchanged logic) ---- */
    function wireEye(eyeId, pwId) {
      $(eyeId).addEventListener("click", () => {
        const pw = $(pwId);
        pw.type = pw.type === "password" ? "text" : "password";
        $(eyeId).textContent = pw.type === "password" ? "👁" : "🙈";
      });
    }
    wireEye("eye", "password");
    wireEye("su-eye", "su-password");

    function showPane(signup) {
      $("tabs").classList.toggle("signup", signup);
      $("tab-in").classList.toggle("active", !signup);
      $("tab-up").classList.toggle("active", signup);
      $("login-form").style.display = signup ? "none" : "";
      $("signup-form").style.display = signup ? "" : "none";
      const pane = signup ? $("signup-form") : $("login-form");
      pane.classList.remove("pane"); void pane.offsetWidth; pane.classList.add("pane");
    }
    $("tab-in").addEventListener("click", () => showPane(false));
    $("tab-up").addEventListener("click", () => showPane(true));

    $("forgot").addEventListener("click", (e) => {
      e.preventDefault();
      toast("info", "Password reset: contact the platform administrator.");
    });

    $("login-form").addEventListener("submit", async (e) => {
      e.preventDefault();
      const btn = $("submit");
      btn.disabled = true; btn.classList.add("loading");
      $("submit-label").textContent = "Signing in…";
      try {
        const r = await fetch("/api/login", {
          method: "POST", headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            email: $("email").value, password: $("password").value,
            remember: $("remember").checked,
          }),
        });
        const d = await r.json();
        if (r.ok && d.ok) {
          toast("ok", "Welcome back — loading the portal…");
          $("card").classList.add("success-out");
          setTimeout(() => (location.href = "/"), 650);
          return;
        }
        throw d.error || "login failed";
      } catch (err) {
        toast("err", typeof err === "string" ? err : "Cannot reach the server.");
        const card = $("card");
        card.classList.remove("shake"); void card.offsetWidth;
        card.classList.add("shake");
      } finally {
        btn.disabled = false; btn.classList.remove("loading");
        $("submit-label").textContent = "Sign in";
      }
    });

    $("signup-form").addEventListener("submit", async (e) => {
      e.preventDefault();
      if ($("su-password").value !== $("su-confirm").value) {
        toast("err", "Passwords do not match.");
        return;
      }
      const btn = $("su-submit");
      btn.disabled = true; btn.classList.add("loading");
      $("su-label").textContent = "Creating account…";
      try {
        const r = await fetch("/api/signup", {
          method: "POST", headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            name: $("su-name").value, email: $("su-email").value,
            password: $("su-password").value,
          }),
        });
        const d = await r.json();
        if (r.ok && d.ok) {
          toast("ok", "Account created — welcome to Pak-ClimInt!");
          $("card").classList.add("success-out");
          setTimeout(() => (location.href = "/"), 650);
          return;
        }
        throw d.error || "sign-up failed";
      } catch (err) {
        toast("err", typeof err === "string" ? err : "Cannot reach the server.");
        const card = $("card");
        card.classList.remove("shake"); void card.offsetWidth;
        card.classList.add("shake");
      } finally {
        btn.disabled = false; btn.classList.remove("loading");
        $("su-label").textContent = "Create account";
      }
    });
  </script>
</body>
</html>
